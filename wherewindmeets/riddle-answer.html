  var items=[];
  DATA.forEach(function(d,i){
    var div=document.createElement("div");div.className="result-item";
    div.innerHTML='<div class="clue-cell"><div class="clue-label">Clue</div><div class="clue-text" id="ct'+i+'">'+esc(d.clue)+'</div></div><div class="arrow-cell"><svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div><div class="answer-cell"><div class="answer-label">Answer</div><div class="answer-text">'+esc(d.answer)+'</div></div><div class="copy-cell"><button class="copy-btn" data-answer="'+escA(d.answer)+'"><svg viewBox="0 0 24 24" stroke-width="1.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy</button></div>';
    grid.appendChild(div);
    items.push({el:div,clue:d.clue.toLowerCase(),ctEl:div.querySelector("#ct"+i),rawClue:d.clue});
  });
  updateCount(DATA.length);
  searchIn.addEventListener("input",function(){
    var q=this.value.trim().toLowerCase(),visible=0;
    items.forEach(function(item){
      if(!q||item.clue.indexOf(q)!==-1){
        item.el.classList.remove("hidden");
        if(q){var idx=item.rawClue.toLowerCase().indexOf(q),raw=esc(item.rawClue);item.ctEl.innerHTML=raw.slice(0,idx)+"<mark>"+raw.slice(idx,idx+q.length)+"</mark>"+raw.slice(idx+q.length);}
        else{item.ctEl.innerHTML=esc(item.rawClue);}
        visible++;
      }else{item.el.classList.add("hidden");item.ctEl.innerHTML=esc(item.rawClue);}
    });
    updateCount(visible);noRes.style.display=visible===0?"block":"none";
  });
  grid.addEventListener("click",function(e){
    var btn=e.target.closest(".copy-btn");if(!btn)return;
    var ans=btn.dataset.answer,orig=btn.innerHTML;
    if(navigator.clipboard){navigator.clipboard.writeText(ans).then(function(){flash(btn,orig);});}
    else{var ta=document.createElement("textarea");ta.value=ans;ta.style.cssText="position:fixed;opacity:0";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);flash(btn,orig);}
  });
  function flash(btn,orig){btn.classList.add("copied");btn.innerHTML='<svg viewBox="0 0 24 24" stroke-width="1.5"><polyline points="20 6 9 17 4 12"/></svg>Copied';setTimeout(function(){btn.classList.remove("copied");btn.innerHTML=orig;},1800);}
  function updateCount(n){countEl.textContent=n+" result"+(n!==1?"s":"");}
  function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  function escA(s){return String(s).replace(/"/g,"&quot;");}
